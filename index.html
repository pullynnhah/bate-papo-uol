<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Bate-Papo UOL</title>
  </head>
  <body>
    <header>
      <img src="./assets/uol.png" alt="Logo Bate-Papo UOL" />
      <ion-icon name="people"></ion-icon>
    </header>
    <main>
      <p class="status">
        <span class="time">(09:21:45)</span>
        <strong class="from">João</strong>
        <span class="text">entra na sala...</span>
      </p>
      <p class="message">
        <span class="time">(09:22:28)</span>
        <strong class="from">João</strong> para
        <strong class="to">Todos</strong>:
        <span class="text">Bom dia</span>
      </p>
      <p class="message">
        <span class="time">(09:22:38)</span>
        <strong class="from">Maria</strong> para
        <strong class="to">João</strong>:
        <span class="text">Oi João :)</span>
      </p>
      <p class="private">
        <span class="time">(09:22:48)</span>
        <strong class="from">João</strong> reservadamente para
        <strong class="to">Maria</strong>:
        <span class="text">Oi gatinha quer tc?</span>
      </p>
      <p class="status">
        <span class="time">(09:22:58)</span>
        <strong class="from">Maria</strong>
        <span class="text">sai da sala...</span>
      </p>
    </main>
    <footer>
      <div>
        <input type="text" placeholder="Escreva aqui..." />
        <p>Enviando para Maria (reservadamente)</p>
      </div>
      <button></button>
      <ion-icon name="paper-plane-outline"></ion-icon>
    </footer>
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./scripts/script.js"></script>
  </body>
</html>
