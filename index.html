<!DOCTYPE html>
<html lang="pt-br">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <link rel="shortcut icon" href="./assets/favicon.ico" type="image/x-icon" />
    <link rel="stylesheet" href="./styles/reset.css" />
    <link rel="stylesheet" href="./styles/style.css" />
    <title>Bate-Papo UOL</title>
  </head>
  <body>
    <div class="login-page active">
      <img src="./assets/uol.png" alt="Logo Bate-Papo UOL" />
      <div class="login">
        <p>Usuário já existe!</p>
        <input type="text" placeholder="Digite seu nome" />
        <button>Entrar</button>
      </div>
      <div class="loading hide">
        <img src="./assets/loader.gif" alt="loader gif" />
        <p>Entrando...</p>
      </div>
    </div>
    <div class="main-page">
      <header>
        <img src="./assets/uol.png" alt="Logo Bate-Papo UOL" />
        <ion-icon name="people"></ion-icon>
      </header>

      <main></main>
      <aside>
        <div class="close"></div>
        <div class="selection">
          <h2>Escolha um contato<br />para enviar mensagem:</h2>
          <div class="participants"></div>
          <h2>Escolha a visibilidade:</h2>
          <div class="visibilities">
            <div class="option active">
              <ion-icon name="lock-open"></ion-icon>
              <p>Público</p>
              <img src="./assets/check.svg" alt="checkmark" />
            </div>
            <div class="option">
              <ion-icon name="lock-closed"></ion-icon>
              <p>Reservadamente</p>
              <img src="./assets/check.svg" alt="checkmark" />
            </div>
          </div>
        </div>
      </aside>

      <footer>
        <div>
          <input type="text" placeholder="Escreva aqui..." />
          <p>Enviando para <span class="send-to">Todos</span></p>
        </div>
        <button><ion-icon name="paper-plane-outline"></ion-icon></button>
      </footer>
    e
    <script
      type="module"
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.esm.js"></script>
    <script
      nomodule
      src="https://unpkg.com/ionicons@5.5.2/dist/ionicons/ionicons.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/axios/dist/axios.min.js"></script>
    <script src="./scripts/script.js"></script>
  </body>
</html>
